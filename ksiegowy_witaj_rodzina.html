<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>Jaślanka</title>

<style>
body {
    margin: 0;
    font-family: Arial;

    /* TŁO NA CAŁĄ STRONĘ */
    background-image: url("tlo.png");
    background-size: cover;
    background-position: center;
    background-attachment: fixed;
}

/* 🔥 GRAFIKA GŁÓWNA — PEŁNA WYSOKOŚĆ STRONY */
.hero {
    width: 100%;
    min-height: 100vh;          /* ważne — żadnych białych pasków */
    display: flex;
    justify-content: center;
    align-items: center;
}

.hero img {
    height: 100vh;              /* zajmuje całą wysokość ekranu */
    width: auto;
    display: block;
}

/* 🔶 GÓRNY PASEK - DREWNO */
.topbar{
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 0px 20px;
    height: 80px;

    background-image: url("drewno.png");
    background-size: cover;
    background-position: center;

    box-shadow:
        inset 0 4px 8px rgba(0,0,0,0.35),
        inset 0 -4px 8px rgba(255,255,255,0.08);

    border-bottom: 3px solid #3b220f;
}

/* 🔗 MENU */
.menu a{
    margin: 0 10px;
    text-decoration: none;
    color: white;
    font-weight: bold;
    text-shadow: 0 1px 2px rgba(0,0,0,0.5);
}

/* 🏷 LOGO */
.brand{
    display: flex;
    align-items: center;
    gap: 10px;
    text-decoration: none;
    color: white;
    font-size: 22px;
    font-weight: bold;
}

.logo-img{
    height: 160px;
    width: auto;
}

/* ===== STOPKA ===== */
.footer{
    background: #1f1f1f;
    color: white;
    padding: 30px 20px;
    margin-top: 0;
}

.footer-container{
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 20px;
    max-width: 1000px;
    margin: auto;
}

.footer-box{
    background: #2c2c2c;
    padding: 15px;
    border-radius: 10px;
}

.footer-bottom{
    text-align: center;
    margin-top: 20px;
    opacity: 0.7;
}
</style>
</head>

<body>

<div class="topbar">
    <div class="menu">
        <a href="sklep.html">Sklep</a>
        <a href="onas.html">O nas</a>
        <a href="praca.html">Praca</a>
        <a href="kontakt.html">Kontakt</a>
        <a href="koszyk.html">Koszyk</a>
    </div>

    <a href="index.html" class="brand">
        <img src="logo.png" class="logo-img">
        Jaślanka
    </a>
</div>

<!-- ⭐ GRAFIKA NA ŚRODKU, BEZ BIAŁYCH PASKÓW -->
<div class="hero">
    <img src="ksiegowy_rodzina.png">
</div>

<!-- STOPKA -->
<div class="footer">
    <div class="footer-container">
        
        <div class="footer-box">
            <h3>Główne sklepy</h3>
            <p>ul. Lwowska 3<br>ul. Rynek 15</p>
        </div>

        <div class="footer-box">
            <h3>Kontakt</h3>
            <p>Tel: 532 503 650<br>Email: masarnia_jaślanka@gmail.com</p>
        </div>

        <div class="footer-box">
            <h3>Informacje</h3>
            <p>Godziny otwarcia:<br>Pn–Sb 6:00–22:00</p>
        </div>

    </div>

    <div class="footer-bottom">
        © 2026 Jaślanka - wszystkie prawa zastrzeżone
    </div>
</div>

</body>
</html>
