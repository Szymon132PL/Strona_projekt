<!DOCTYPE html>
<html lang="pl">
<head>

<title>Jaślanka</title>

<style>
body {
    margin: 0;
    font-family: Arial;
}

/* 🔶 GÓRNY PASEK - DREWNO */
.topbar{
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 0px 20px;
    height: 80px;
    box-sizing: border-box;

    /* 🪵 PRAWDZIWA DESKA Z OBRAZU */
    background-image: url("drewno.png");
    background-size: cover;
    background-position: center;

    box-shadow:
        inset 0 4px 8px rgba(0,0,0,0.35),
        inset 0 -4px 8px rgba(255,255,255,0.08);

    border-bottom: 3px solid #3b220f;
    
}

/* 🔗 MENU */
.menu a{
    margin: 0 10px;
    text-decoration: none;
    color: white;
    font-weight: bold;
    text-shadow: 0 1px 2px rgba(0,0,0,0.5);
}

/* 🏷️ LOGO + NAZWA */
.brand{
    display: flex;
    align-items: center;
    gap: 10px;
    text-decoration: none;
    color: white;
    font-size: 22px;
    font-weight: bold;
    text-shadow: 0 1px 2px rgba(0,0,0,0.5);
}

/* 🖼️ LOGO */
.logo-img{
    height: 160px;
    width: auto;
    display: block;
}

/* ===== TREŚĆ ===== */
h1{
    padding: 20px;
}

/* ===== STOPKA KONTAKTOWA ===== */
.footer{
    background: #1f1f1f;
    color: white;
    margin-top: 60px;
    padding: 30px 20px;
}

.footer-container{
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 20px;
    max-width: 1000px;
    margin: auto;
}

.footer-box{
    background: #2c2c2c;
    padding: 15px;
    border-radius: 10px;
}

.footer-box h3{
    margin-top: 0;
    color: orange;
}

.footer-bottom{
    text-align: center;
    margin-top: 20px;
    font-size: 14px;
    opacity: 0.7;
}

@media (max-width: 700px){
    .footer-container{
        grid-template-columns: 1fr;
    }
}

</style>
</head>

<body>
