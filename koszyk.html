<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>Koszyk - Jaślanka</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background-color: #000;
}

/* ===== TOPBAR ===== */
.topbar{
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 0 20px;
    height: 80px;

    background-image: url("drewno.png");
    background-size: cover;
    background-position: center;

    box-shadow: inset 0 4px 8px rgba(0,0,0,0.35),
                inset 0 -4px 8px rgba(255,255,255,0.08);
    border-bottom: 3px solid #3b220f;
}

.menu a{
    margin: 0 10px;
    text-decoration: none;
    color: white;
    font-weight: bold;
}

.brand{
    display: flex;
    align-items: center;
    gap: 10px;
    text-decoration: none;
    color: white;
    font-size: 22px;
    font-weight: bold;
}

.logo-img{
    height: 160px;
}

/* ===== GRAFIKA KOSZYKA ===== */
.karta{
    width: 100%;
    display: flex;
    justify-content: center;
}

.karta img{
    width: 90%; /* ← TYM STERUJESZ ROZMIAREM */
    max-width: 1400px;
    margin-top: 40px;
}

/* ===== STOPKA ===== */
.footer{
    margin-top: 100px;
    background: #1f1f1f;
    color: white;
    padding: 30px 20px;
}

.footer-container{
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 20px;
    max-width: 1000px;
    margin: auto;
}

.footer-box{
    background: #2c2c2c;
    padding: 15px;
    border-radius: 10px;
}

.footer-box h3{
    margin-top: 0;
    color: orange;
}

.footer-bottom{
    text-align: center;
    margin-top: 20px;
    font-size: 14px;
    opacity: 0.7;
}

@media (max-width: 700px){
    .footer-container{
        grid-template-columns: 1fr;
    }
}
</style>
</head>

<body>

<!-- ===== TOPBAR ===== -->
<div class="topbar">
    <div class="menu">
        <a href="sklep.html">Sklep</a>
        <a href="onas.html">O nas</a>
        <a href="praca.html">Praca</a>
        <a href="kontakt.html">Kontakt</a>
        <a href="koszyk.html">Koszyk</a>
    </div>

    <a href="index.html" class="brand">
        <img src="logo.png" class="logo-img">
        Jaślanka
    </a>
</div>

<!-- ===== KOSZYK (CAŁA GRAFIKA) ===== -->
<div class="karta">
    <img src="karta.png">
</div>

<!-- ===== STOPKA ===== -->
<div class="footer">
    <div class="footer-container">
        
        <div class="footer-box">
            <h3>Główne sklepy</h3>
            <p>ul. Lwowska 3<br>ul. Rynek 15</p>
        </div>

        <div class="footer-box">
            <h3>Kontakt</h3>
            <p>Tel: 532 503 650<br>Email: masarnia_jaślanka@gmail.com</p>
        </div>

        <div class="footer-box">
            <h3>Informacje</h3>
            <p>Godziny otwarcia:<br>Pn–Sb 6:00–22:00</p>
        </div>

    </div>

    <div class="footer-bottom">
        © 2026 Jaślanka - wszystkie prawa zastrzeżone
    </div>
</div>

</body>
</html>
